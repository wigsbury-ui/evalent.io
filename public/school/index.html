<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width"/>
  <title>Evalent – Thresholds</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:24px;max-width:780px}
    .row{display:flex;align-items:center;gap:12px;margin:10px 0}
    label{width:120px}
    input[type=range]{flex:1}
    .val{width:44px;text-align:right}
    button{padding:10px 16px}
    .card{border:1px solid #eee;border-radius:10px;padding:16px;margin:16px 0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  </style>
</head>
<body>
  <h1>Grade Thresholds</h1>
  <div class="card">
    <div class="row"><label>School ID</label><input id="school" style="flex:1"/></div>
    <div class="row"><label>Grade (Year)</label><input id="grade" type="number" min="1" max="13" value="7"/></div>
    <button id="load">Load</button>
  </div>

  <div class="card" id="sliders" style="display:none">
    <div class="row"><label>English</label><input type="range" min="0" max="100" value="60" id="English"/><div class="val" id="val-English">60</div></div>
    <div class="row"><label>Maths</label><input type="range" min="0" max="100" value="60" id="Maths"/><div class="val" id="val-Maths">60</div></div>
    <div class="row"><label>Reasoning</label><input type="range" min="0" max="100" value="60" id="Reasoning"/><div class="val" id="val-Reasoning">60</div></div>
    <div class="row"><label>Readiness</label><input type="range" min="0" max="100" value="60" id="Readiness"/><div class="val" id="val-Readiness">60</div></div>
    <button id="save">Save thresholds</button>
  </div>

  <script>
    const $ = (id)=>document.getElementById(id);
    const params = new URLSearchParams(location.search);
    if (params.get('school_id')) $('school').value = params.get('school_id');
    if (params.get('grade')) $('grade').value = params.get('grade');

    ['English','Maths','Reasoning','Readiness'].forEach(d=>{
      $(d).addEventListener('input', e => $('val-'+d).textContent = e.target.value);
    });

    $('load').onclick = async ()=>{
      const school_id = $('school').value.trim();
      const grade = Number($('grade').value);
      if(!school_id || !grade) return alert('Enter school_id and grade');

      const r = await fetch(`/api/expectations?school_id=${encodeURIComponent(school_id)}&grade=${grade}&_=${Date.now()}`);
      const j = await r.json();
      if(!j.ok){ alert('Load failed: '+(j.error||'unknown')); return; }
      const map = {};
      (j.data||[]).forEach(row=> map[row.domain]=row.pass_threshold);
      ['English','Maths','Reasoning','Readiness'].forEach(d=>{
        const v = map[d] ?? 60;
        $(d).value = v; $('val-'+d).textContent = v;
      });
      $('sliders').style.display='block';
    };

    $('save').onclick = async ()=>{
      const body = {
        school_id: $('school').value.trim(),
        grade: Number($('grade').value),
        thresholds: ['English','Maths','Reasoning','Readiness'].map(d=>({
          domain:d, pass_threshold: Number($(d).value)
        }))
      };
      const r = await fetch('/api/expectations', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) });
      const j = await r.json();
      if(!j.ok) return alert('Save failed: '+(j.error||'unknown'));
      alert('Saved!');
    };
  </script>
</body>
</html>
